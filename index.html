<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Street View Downloader</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background:#0f172a; color:#e2e8f0; font-family:system-ui,sans-serif; }
  input { background:#1e293b; border:1px solid #334155; color:#e2e8f0; border-radius:.5rem; }
  input:focus { border-color:#38bdf8; outline:none; box-shadow:0 0 0 2px rgba(56,189,248,.2); }
  .q-card { cursor:pointer; border-radius:.75rem; border:1px solid #334155; padding:.75rem 1rem;
            transition:border-color .15s, background .15s; text-align:center; user-select:none; }
  .q-card.selected { border-color:#38bdf8; background:rgba(56,189,248,.08); }
  .q-card:not(.selected):hover { border-color:#475569; }
</style>
</head>
<body class="min-h-screen flex flex-col items-center py-14 px-4">
<div class="w-full max-w-xl">

  <!-- Header -->
  <div class="text-center mb-8">
    <h1 class="text-3xl font-bold text-sky-400 tracking-tight">Street View Downloader</h1>
    <p class="text-slate-400 mt-2 text-sm">Download full-resolution 360° panoramas — runs entirely in your browser</p>
  </div>

  <!-- Main card -->
  <div class="bg-slate-800 rounded-2xl p-7 shadow-xl border border-slate-700 space-y-5">

    <!-- URL input -->
    <div>
      <label class="block text-sm font-medium text-slate-300 mb-2">Google Maps Street View URL</label>
      <input id="url" type="text"
        placeholder="Paste a Street View URL here…"
        class="w-full px-4 py-3 text-sm" />
    </div>

    <!-- Quality -->
    <div>
      <label class="block text-sm font-medium text-slate-300 mb-2">Quality</label>
      <div class="grid grid-cols-3 gap-3">
        <div class="q-card" data-q="3" data-label="Low">
          <div class="font-semibold text-sm">Low</div>
          <div class="text-xs text-slate-400 mt-0.5">4K · 32 tiles</div>
        </div>
        <div class="q-card selected" data-q="4" data-label="Medium">
          <div class="font-semibold text-sm text-sky-300">Medium</div>
          <div class="text-xs text-slate-400 mt-0.5">8K · 128 tiles</div>
        </div>
        <div class="q-card" data-q="5" data-label="High">
          <div class="font-semibold text-sm">High</div>
          <div class="text-xs text-slate-400 mt-0.5">16K · 512 tiles</div>
        </div>
      </div>
    </div>

    <!-- Go button -->
    <button id="btn" onclick="start()"
      class="w-full bg-sky-500 hover:bg-sky-400 active:bg-sky-600 disabled:opacity-50
             text-white font-semibold py-3 rounded-xl transition-colors text-sm">
      Download Panorama
    </button>
  </div>

  <!-- Progress card -->
  <div id="progress-card" class="hidden mt-4 bg-slate-800 rounded-2xl p-6 border border-slate-700">
    <div class="flex justify-between items-center mb-2">
      <span class="text-sm text-slate-300" id="prog-label">Starting…</span>
      <span class="text-sm font-mono text-sky-400" id="prog-pct">0%</span>
    </div>
    <div class="w-full bg-slate-700 rounded-full h-2">
      <div id="prog-bar" class="bg-sky-500 h-2 rounded-full transition-all duration-200" style="width:0"></div>
    </div>
    <p class="text-xs text-slate-500 mt-2" id="prog-detail"></p>
  </div>

  <!-- Result card -->
  <div id="result-card" class="hidden mt-4 bg-slate-800 rounded-2xl p-6 border border-slate-700">
    <div class="flex justify-between items-center mb-4">
      <div>
        <p class="font-semibold text-green-400 text-sm">Ready to save</p>
        <p class="text-xs text-slate-400 mt-0.5" id="result-info"></p>
      </div>
      <a id="dl-link" download="streetview_panorama.jpg"
        class="bg-green-500 hover:bg-green-400 text-white font-semibold px-5 py-2 rounded-lg text-sm transition-colors cursor-pointer">
        Save Image
      </a>
    </div>
    <img id="preview" src="" alt="Panorama preview"
      class="w-full rounded-lg border border-slate-600" style="max-height:250px; object-fit:cover;" />
  </div>

  <!-- Error card -->
  <div id="error-card" class="hidden mt-4 bg-red-950 rounded-2xl p-5 border border-red-800">
    <p class="font-semibold text-red-400 text-sm">Error</p>
    <p class="text-slate-300 text-sm mt-1" id="error-msg"></p>
  </div>

</div><!-- /container -->

<script>
// ── quality selector ──────────────────────────────────────────────────────────
let selectedZoom = 4;
document.querySelectorAll('.q-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.q-card').forEach(c => {
      c.classList.remove('selected');
      c.querySelector('div').className = 'font-semibold text-sm';
    });
    card.classList.add('selected');
    card.querySelector('div').className = 'font-semibold text-sm text-sky-300';
    selectedZoom = parseInt(card.dataset.q);
  });
});

// ── pano ID extraction ────────────────────────────────────────────────────────
function extractPanoId(input) {
  input = input.trim();
  if (!input.includes('/') && input.length >= 15) return input;
  let m = input.match(/!1s([A-Za-z0-9_\-]+)!/);
  if (m) return m[1];
  m = input.match(/panoid=([A-Za-z0-9_\-]+)/);
  if (m) return m[1];
  return null;
}

// ── tile fetch ────────────────────────────────────────────────────────────────
const TILE_BASE = 'https://streetviewpixels-pa.googleapis.com/v1/tile?cb_client=maps_sv.tactile';

function fetchTile(panoId, zoom, x, y) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = `${TILE_BASE}&panoid=${panoId}&x=${x}&y=${y}&zoom=${zoom}`;
  });
}

// ── stitch panorama ───────────────────────────────────────────────────────────
async function buildPanorama(panoId, zoom, onProgress) {
  const tilesX  = 2 ** zoom;
  const tilesY  = 2 ** (zoom - 1);
  const tileSize = 512;
  const total    = tilesX * tilesY;

  // Regular HTMLCanvasElement — works in all browsers including Safari
  const canvas = document.createElement('canvas');
  canvas.width  = tilesX * tileSize;
  canvas.height = tilesY * tileSize;
  const ctx = canvas.getContext('2d');

  const coords = [];
  for (let y = 0; y < tilesY; y++)
    for (let x = 0; x < tilesX; x++)
      coords.push([x, y]);

  const BATCH = 16;
  let done = 0;
  for (let i = 0; i < coords.length; i += BATCH) {
    const batch = coords.slice(i, i + BATCH);
    await Promise.all(batch.map(async ([x, y]) => {
      const img = await fetchTile(panoId, zoom, x, y);
      if (img) ctx.drawImage(img, x * tileSize, y * tileSize);
      onProgress(++done, total);
    }));
  }

  return canvas;
}

// ── main flow ─────────────────────────────────────────────────────────────────
async function start() {
  const urlInput = document.getElementById('url').value.trim();
  if (!urlInput) { alert('Please paste a Google Maps Street View URL.'); return; }

  const panoId = extractPanoId(urlInput);
  if (!panoId) {
    showError("Couldn't find a panorama ID in that URL. Make sure it's a Street View URL.");
    return;
  }

  hide('result-card'); hide('error-card');
  show('progress-card');
  setBtn(true, 'Downloading…');
  setProgress(0, 'Fetching tiles…', '');

  try {
    const canvas = await buildPanorama(panoId, selectedZoom, (done, total) => {
      const pct = Math.round(done / total * 100);
      setProgress(pct, 'Downloading tiles…', `${done} / ${total} tiles`);
    });

    setProgress(100, 'Encoding image…', '');

    // canvas.toBlob works in all browsers; convertToBlob is OffscreenCanvas-only
    const blob = await new Promise((resolve, reject) =>
      canvas.toBlob(b => b ? resolve(b) : reject(new Error('Encoding failed')), 'image/jpeg', 0.92)
    );
    const objUrl = URL.createObjectURL(blob);

    const dlLink = document.getElementById('dl-link');
    dlLink.href     = objUrl;
    dlLink.download = `streetview_${panoId}.jpg`;

    document.getElementById('preview').src = objUrl;
    document.getElementById('result-info').textContent =
      `${canvas.width.toLocaleString()} × ${canvas.height.toLocaleString()} px · JPEG · ${(blob.size/1024/1024).toFixed(1)} MB`;

    show('result-card');
    setProgress(100, 'Done!', '');
  } catch(e) {
    showError(e.message || String(e));
  } finally {
    setBtn(false, 'Download Panorama');
  }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setProgress(pct, label, detail) {
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-label').textContent = label;
  document.getElementById('prog-detail').textContent = detail;
}
function setBtn(disabled, text) {
  const b = document.getElementById('btn');
  b.disabled = disabled;
  b.textContent = text;
}
function showError(msg) {
  show('error-card');
  document.getElementById('error-msg').textContent = msg;
  setBtn(false, 'Download Panorama');
}
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }
</script>
</body>
</html>
